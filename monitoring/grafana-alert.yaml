apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alert-config
  namespace: monitoring
data:
  alerts.yaml: |
    groups:
      - name: devops-platform-alerts
        rules:
          - alert: HighCPUUsage
            expr: (sum(rate(container_cpu_usage_seconds_total[5m])) / sum(machine_cpu_cores)) * 100 > 80
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High CPU Usage Detected"
              description: "CPU usage is above 80% for more than 2 minutes"

          - alert: HighMemoryUsage
            expr: (sum(container_memory_usage_bytes) / sum(machine_memory_bytes)) * 100 > 85
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High Memory Usage Detected"
              description: "Memory usage is above 85% for more than 2 minutes"

          - alert: PodDown
            expr: kube_pod_status_ready{condition="false"} == 1
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Pod is Down"
              description: "Pod {{ $labels.pod }} is not ready"
